<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewurk HRMS - Timetracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #27293d;
            --card-bg: rgba(39, 41, 61, 0.6);
            --text-primary: #e0e0e0;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #667eea;
            --success-color: #4CAF50;
            --danger-color: #f48771;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .login-form {
            max-width: 400px;
            margin: 40px auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-logout {
            background: var(--danger-color);
            padding: 8px 16px;
            width: auto;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .badge-in {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-out {
            background: rgba(244, 135, 113, 0.2);
            color: var(--danger-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .error {
            background: rgba(244, 135, 113, 0.1);
            border: 1px solid var(--danger-color);
            padding: 12px;
            border-radius: 6px;
            color: var(--danger-color);
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Login View -->
        <div id="login-view">
            <div class="header">
                <i class="fa-solid fa-building" style="font-size: 28px; color: var(--accent-color);"></i>
                <h1>Mewurk HRMS</h1>
            </div>
            <div class="login-form">
                <div class="card">
                    <div id="error-message" class="error" style="display: none;"></div>
                    <div class="form-group">
                        <label>Email / Username</label>
                        <input type="text" id="mewurk-email" placeholder="your.email@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="mewurk-password" placeholder="Enter your password">
                    </div>
                    <button class="btn" onclick="loginToMewurk()" id="login-btn">
                        <i class="fa-solid fa-sign-in-alt"></i> Login to Mewurk
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" style="display: none;">
            <div class="header" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-building" style="font-size: 28px; color: var(--accent-color);"></i>
                    <h1>Mewurk HRMS</h1>
                </div>
                <button class="btn btn-logout" onclick="logoutFromMewurk()">Logout</button>
            </div>

            <div style="margin-bottom: 24px;">
                <h2 id="user-name">Welcome</h2>
                <p id="user-email" style="color: var(--text-secondary);"></p>
            </div>

            <!-- Live Status Card -->
            <div id="live-card-container"></div>

            <div class="card">
                <h3>Monthly Overview</h3>
                <div class="stats-grid" id="stats-grid"></div>
            </div>

            <div class="card">
                <h3>Today's Attendance</h3>
                <div id="attendance-container"></div>
            </div>
        </div>
    </div>

    <script>
        var api = window.electronAPI || {
            invoke: () => Promise.reject('electronAPI not available')
        };

        var mewurkData = {
            isLoggedIn: false,
            token: null,
            refreshToken: null,
            userModel: null,
            tenantId: null,
            lastAttendance: null,
            timer: null
        };

        const COMMON_HEADERS = {
            "accept": "application/json",
            "accept-language": "en-GB,en-US;q=0.9,en;q=0.8",
            "content-type": "application/json",
            "priority": "u=1, i"
        };

        window.addEventListener('load', async () => {
            const saved = await api.invoke('get-session', 'mewurk-data');
            if (saved && saved.isLoggedIn) {
                mewurkData = saved;
                await refreshMewurkToken();
                showDashboard();
            }
        });

        async function refreshMewurkToken() {
            if (!mewurkData.refreshToken) return;
            try {
                const response = await fetch('https://app.mewurk.com/api/v1/userservice/account/refreshtoken', {
                    method: 'POST',
                    headers: COMMON_HEADERS,
                    body: JSON.stringify({ refreshToken: mewurkData.refreshToken })
                });
                const data = await response.json();
                if (data.isSuccess) {
                    mewurkData.token = data.data.token;
                    mewurkData.refreshToken = data.data.refreshToken;
                    await api.invoke('save-session', 'mewurk-data', mewurkData);
                }
            } catch (e) { console.error('Refresh failed', e); }
        }

        async function fetchWithAuth(url, options = {}) {
            let response = await fetch(url, {
                ...options,
                headers: { ...COMMON_HEADERS, ...options.headers, 'authorization': `Bearer ${mewurkData.token}` }
            });
            if (response.status === 401 && mewurkData.refreshToken) {
                await refreshMewurkToken();
                response = await fetch(url, {
                    ...options,
                    headers: { ...COMMON_HEADERS, ...options.headers, 'authorization': `Bearer ${mewurkData.token}` }
                });
            }
            return response;
        }

        async function loginToMewurk() {
            const email = document.getElementById('mewurk-email').value.trim();
            const password = document.getElementById('mewurk-password').value;
            const loginBtn = document.getElementById('login-btn');

            if (!email || !password) return showError('Please enter all fields');

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Connecting...';

            try {
                const lookup = await fetch(`https://app.mewurk.com/api/v1/userservice/account/lookup?userName=${encodeURIComponent(email)}`);
                const lookupData = await lookup.json();
                if (!lookupData.isSuccess) throw new Error('User not found');

                const tenantId = lookupData.data.tenantDetails[0].tenantId;
                const encodedUser = btoa(`${email}|${tenantId}`);

                const loginResponse = await fetch('https://app.mewurk.com/api/v1/userservice/account/login', {
                    method: 'POST',
                    headers: COMMON_HEADERS,
                    body: JSON.stringify({ userName: encodedUser, password: password, otp: null })
                });

                const loginData = await loginResponse.json();
                if (!loginData.isSuccess) throw new Error(loginData.message || 'Login failed');

                mewurkData = {
                    isLoggedIn: true,
                    token: loginData.data.token,
                    refreshToken: loginData.data.refreshToken,
                    userModel: loginData.data.userModel,
                    tenantId: tenantId
                };
                await api.invoke('save-session', 'mewurk-data', mewurkData);
                showDashboard();
            } catch (e) {
                showError(e.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login to Mewurk';
            }
        }

        function showDashboard() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('user-name').textContent = `${mewurkData.userModel.firstName} ${mewurkData.userModel.lastName}`;
            document.getElementById('user-email').textContent = mewurkData.userModel.email;
            loadStats();
            loadAttendance();

            if (mewurkData.timer) clearInterval(mewurkData.timer);
            mewurkData.timer = setInterval(updateLiveCalculations, 60000);
        }

        async function loadStats() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = 'Loading...';
            try {
                const response = await fetchWithAuth('https://app.mewurk.com/api/v1/attendanceservice/attendance/carddetails', {
                    method: 'POST',
                    body: JSON.stringify({ employeeCode: Number(mewurkData.userModel.employeeCode), year: new Date().getFullYear(), month: new Date().getMonth() + 1 })
                });
                const data = await response.json();
                if (data.isSuccess) {
                    const d = data.data.cardDetails;
                    grid.innerHTML = `
                        <div class="stat-card">Present: ${d.present.totalPresent}</div>
                        <div class="stat-card" style="border-left-color: var(--danger-color)">Absence: ${d.absent.totalAbsent}</div>
                        <div class="stat-card">Hours: ${d.workingHours.total.toFixed(1)}h</div>
                        <div class="stat-card" style="border-left-color: #FF9800">Late: ${d.gracePeriod.lateIn} | Early: ${d.gracePeriod.earlyOut}</div>
                    `;
                } else {
                    grid.innerHTML = '<div class="error">Failed to load stats details</div>';
                }
            } catch (e) { grid.innerHTML = 'Failed to load stats'; }
        }

        function formatToIst(timeStr) {
            try {
                const date = new Date(timeStr.includes('Z') ? timeStr : timeStr + 'Z');
                return date.toLocaleTimeString('en-GB', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true,
                    timeZone: 'Asia/Kolkata'
                }).replace(/^0/, '');
            } catch (e) { return timeStr; }
        }

        function parseMewurkTime(timeStr) {
            try {
                return new Date(timeStr.includes('Z') ? timeStr : timeStr + 'Z');
            } catch (e) { return new Date(); }
        }

        async function loadAttendance() {
            const cont = document.getElementById('attendance-container');
            cont.innerHTML = 'Loading...';
            try {
                const response = await fetchWithAuth('https://app.mewurk.com/api/v1/attendanceservice/attendancelogs/clockindetails', {
                    method: 'POST',
                    body: JSON.stringify({ employeeCode: Number(mewurkData.userModel.employeeCode), clockDate: new Date().toISOString().split('T')[0] })
                });
                const data = await response.json();
                if (data.isSuccess) {
                    mewurkData.lastAttendance = data.data;
                    const logs = data.data.clockInDetails.sort((a, b) => a.clockTime.localeCompare(b.clockTime));
                    let html = '';
                    logs.forEach(l => {
                        const time = formatToIst(l.clockTime);
                        html += `<div class="log-entry">
                            <span><span class="${l.inOutType === 'IN' ? 'badge-in' : 'badge-out'}">${l.inOutType}</span> ${time}</span>
                            <span style="font-size: 11px; color: var(--text-secondary)">${l.deviceName || 'Web'}</span>
                        </div>`;
                    });
                    cont.innerHTML = html || 'No logs today';
                    updateLiveCalculations();
                }
            } catch (e) { cont.innerHTML = 'Failed to load attendance'; }
        }

        function updateLiveCalculations() {
            if (!mewurkData.lastAttendance) return;
            const data = mewurkData.lastAttendance;
            const logs = [...data.clockInDetails].sort((a, b) => a.clockTime.localeCompare(b.clockTime));

            let totalWorkMs = 0;
            let lastIn = null;
            let totalBreakMs = 0;
            let lastOut = null;

            logs.forEach(l => {
                const time = parseMewurkTime(l.clockTime);
                if (l.inOutType === 'IN') {
                    lastIn = time;
                    if (lastOut) {
                        totalBreakMs += (time - lastOut);
                        lastOut = null;
                    }
                } else {
                    if (lastIn) {
                        totalWorkMs += (time - lastIn);
                        lastIn = null;
                    }
                    lastOut = time;
                }
            });

            if (lastIn) totalWorkMs += (new Date() - lastIn);
            if (lastOut) totalBreakMs += (new Date() - lastOut);

            // Shift Logic
            let targetMs = 29700000; // 8h 15m default
            if (data.attendanceConfigurationViewModel) {
                const shift = data.attendanceConfigurationViewModel;
                const [inH, inM] = shift.shiftInTime.split(':').map(Number);
                const [outH, outM] = shift.shiftOutTime.split(':').map(Number);
                const start = new Date(); start.setHours(inH, inM, 0, 0);
                const end = new Date(); end.setHours(outH, outM, 0, 0);
                if (end > start) targetMs = end - start;
            }

            const remainingMs = targetMs - totalWorkMs;
            const progress = Math.min(100, (totalWorkMs / targetMs) * 100);
            const finishesAt = new Date(Date.now() + (remainingMs > 0 ? remainingMs : 0));

            const container = document.getElementById('live-card-container');
            container.innerHTML = `
                <div style="background: var(--bg-secondary); border: 1px solid var(--accent-color); border-radius: 12px; padding: 20px; margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
                        <div>
                            <div style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px;">${remainingMs > 0 ? 'Remaining' : 'Overtime'}</div>
                            <div style="font-size: 32px; font-weight: 800; color: ${remainingMs > 0 ? 'white' : 'var(--success-color)'}; font-family: monospace;">
                                ${Math.floor(Math.abs(remainingMs) / 3600000)}h ${Math.floor((Math.abs(remainingMs) % 3600000) / 60000)}m
                            </div>
                        </div>
                        <div style="text-align: right;">
                             <div style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px;">Target Finish</div>
                             <div style="font-size: 20px; font-weight: 700; color: var(--accent-color);">${finishesAt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: true })}</div>
                        </div>
                    </div>
                    <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px;">
                        <div style="height: 100%; background: var(--accent-color); width: ${progress}%; transition: width 0.5s;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary);">
                        <span>Spent: ${Math.floor(totalWorkMs / 3600000)}h ${Math.floor((totalWorkMs % 3600000) / 60000)}m</span>
                        <span style="color: var(--accent-color); font-weight: bold;">${Math.round(progress)}%</span>
                    </div>
                </div>
            `;
        }

        function logoutFromMewurk() {
            if (mewurkData.timer) clearInterval(mewurkData.timer);
            api.invoke('save-session', 'mewurk-data', null);
            location.reload();
        }

        function showError(m) {
            const e = document.getElementById('error-message');
            e.textContent = m;
            e.style.display = 'block';
        }
    </script>
</body>

</html>
