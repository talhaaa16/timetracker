<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewurk HRMS - Timetracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #27293d;
            --card-bg: rgba(39, 41, 61, 0.6);
            --text-primary: #e0e0e0;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #667eea;
            --success-color: #4CAF50;
            --danger-color: #f48771;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .login-form {
            max-width: 400px;
            margin: 40px auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-logout {
            background: var(--danger-color);
            padding: 8px 16px;
            width: auto;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .attendance-log {
            margin-top: 16px;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .log-type {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-in {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-color);
        }

        .badge-out {
            background: rgba(244, 135, 113, 0.2);
            color: var(--danger-color);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(244, 135, 113, 0.1);
            border: 1px solid var(--danger-color);
            padding: 12px;
            border-radius: 6px;
            color: var(--danger-color);
            margin-bottom: 16px;
            font-size: 13px;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .user-details h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .user-details p {
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Login View -->
        <div id="login-view">
            <div class="header">
                <i class="fa-solid fa-building" style="font-size: 28px; color: var(--accent-color);"></i>
                <h1>Mewurk HRMS</h1>
            </div>

            <div class="login-form">
                <div class="card">
                    <div id="error-message" class="error" style="display: none;"></div>

                    <div class="form-group">
                        <label>Email / Username</label>
                        <input type="text" id="mewurk-email" placeholder="your.email@company.com">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="mewurk-password" placeholder="Enter your password">
                    </div>

                    <button id="login-btn" class="btn" onclick="loginToMewurk()">
                        <i class="fa-solid fa-sign-in-alt"></i> Login to Mewurk
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard View (shown after login) -->
        <div id="dashboard-view" style="display: none;">
            <div class="header">
                <i class="fa-solid fa-building" style="font-size: 28px; color: var(--accent-color);"></i>
                <h1>Mewurk HRMS</h1>
            </div>

            <div class="user-info">
                <div class="user-details">
                    <h2 id="user-name">Loading...</h2>
                    <p id="user-email"></p>
                </div>
                <button class="btn btn-logout" onclick="logoutFromMewurk()">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <!-- Monthly Stats -->
            <div class="card">
                <h3 style="margin-bottom: 16px;">Monthly Overview</h3>
                <div class="stats-grid" id="stats-grid">
                    <div class="loading">Loading stats...</div>
                </div>
            </div>

            <!-- Today's Attendance -->
            <div class="card">
                <h3 style="margin-bottom: 16px;">Today's Attendance</h3>
                <div id="attendance-container">
                    <div class="loading">Loading attendance...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use window.electronAPI exposed by preload.js
        var api = window.electronAPI || {
            invoke: () => Promise.reject('electronAPI not available')
        };

        var mewurkData = {
            isLoggedIn: false,
            token: null,
            refreshToken: null,
            userModel: null,
            tenantId: null
        };

        // Load saved session on startup
        window.addEventListener('load', async () => {
            try {
                const saved = await api.invoke('get-session', 'mewurk-data');
                if (saved && saved.isLoggedIn) {
                    mewurkData = saved;
                    showDashboard();
                }
            } catch (e) {
                console.error('Failed to load Mewurk session:', e);
            }
        });

        async function loginToMewurk() {
            const email = document.getElementById('mewurk-email').value.trim();
            const password = document.getElementById('mewurk-password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';

            try {
                // Step 1: Lookup user to get tenantId
                console.log('Looking up user:', email);
                const lookupResponse = await fetch(`https://app.mewurk.com/api/v1/userservice/account/lookup?userName=${encodeURIComponent(email)}`, {
                    method: 'GET',
                    headers: {
                        'accept': 'application/json',
                        'content-type': 'application/json'
                    }
                });

                if (!lookupResponse.ok) {
                    throw new Error('User lookup failed. Please check your email.');
                }

                const lookupData = await lookupResponse.json();
                console.log('Lookup response:', lookupData);

                if (!lookupData.isSuccess || !lookupData.data.tenantDetails || lookupData.data.tenantDetails.length === 0) {
                    throw new Error('No tenant found for this user');
                }

                const tenantId = lookupData.data.tenantDetails[0].tenantId;
                console.log('Tenant ID:', tenantId);

                // Step 2: Login with base64 encoded userName
                const rawUserName = `${email}|${tenantId}`;
                const encodedUserName = btoa(rawUserName);

                console.log('Logging in with encoded userName');
                const loginResponse = await fetch('https://app.mewurk.com/api/v1/userservice/account/login', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        userName: encodedUserName,
                        password: password,
                        otp: null
                    })
                });

                if (!loginResponse.ok) {
                    const errorText = await loginResponse.text();
                    console.error('Login API failed with status:', loginResponse.status);
                    console.error('Login API error response:', errorText);
                    throw new Error(`Login failed: ${loginResponse.status} - ${errorText.substring(0, 100)}`);
                }

                const loginData = await loginResponse.json();
                console.log('Login API response:', JSON.stringify(loginData, null, 2));

                if (!loginData.isSuccess) {
                    console.error('Login API returned isSuccess=false:', loginData.message);
                    throw new Error(loginData.message || 'Login failed');
                }

                if (!loginData.data || !loginData.data.token) {
                    console.error('Login API response missing data or token:', loginData);
                    throw new Error('Invalid login response: missing token');
                }

                // Save session
                mewurkData = {
                    isLoggedIn: true,
                    token: loginData.data.token,
                    refreshToken: loginData.data.refreshToken,
                    userModel: loginData.data.userModel,
                    tenantId: tenantId,
                    email: email
                };

                console.log('Saving mewurkData:', mewurkData);
                await api.invoke('save-session', 'mewurk-data', mewurkData);

                // Show dashboard
                console.log('Calling showDashboard...');
                showDashboard();

            } catch (error) {
                console.error('Mewurk login error:', error);
                console.error('Error stack:', error.stack);

                // Show detailed error in alert for debugging
                alert('Login Error: ' + (error.message || error.toString()));

                showError(error.message || 'Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fa-solid fa-sign-in-alt"></i> Login to Mewurk';
            }
        }

        async function showDashboard() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';

            // Display user info
            const userName = `${mewurkData.userModel.firstName} ${mewurkData.userModel.lastName}`;
            document.getElementById('user-name').textContent = userName;
            document.getElementById('user-email').textContent = mewurkData.email || mewurkData.userModel.email;

            // Load monthly stats
            await loadMonthlyStats();

            // Load today's attendance
            await loadTodayAttendance();
        }

        async function loadMonthlyStats() {
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '<div class="loading">Loading stats...</div>';

            try {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth() + 1;

                const response = await fetch('https://app.mewurk.com/api/v1/attendanceservice/attendance/carddetails', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'authorization': `Bearer ${mewurkData.token}`,
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        employeeCode: Number(mewurkData.userModel.employeeCode),
                        year: year,
                        month: month
                    })
                });

                if (!response.ok) throw new Error('Failed to load stats');

                const data = await response.json();
                console.log('Card details:', data);

                if (data.isSuccess && data.data.cardDetails) {
                    const details = data.data.cardDetails;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-label">Present Days</div>
                            <div class="stat-value" style="color: var(--success-color);">${details.present.totalPresent}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Absent Days</div>
                            <div class="stat-value" style="color: var(--danger-color);">${details.absent.totalAbsent}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Working Hours</div>
                            <div class="stat-value">${details.workingHours.total.toFixed(1)}h</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Avg Hours/Day</div>
                            <div class="stat-value">${details.workingHours.dayAvg.toFixed(1)}h</div>
                        </div>
                    `;
                } else {
                    statsGrid.innerHTML = '<div class="error">Failed to load stats</div>';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
                statsGrid.innerHTML = '<div class="error">Failed to load stats</div>';
            }
        }

        async function loadTodayAttendance() {
            const container = document.getElementById('attendance-container');
            container.innerHTML = '<div class="loading">Loading attendance...</div>';

            try {
                const today = new Date().toISOString().split('T')[0];

                const response = await fetch('https://app.mewurk.com/api/v1/attendanceservice/attendancelogs/clockindetails', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'authorization': `Bearer ${mewurkData.token}`,
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        employeeCode: Number(mewurkData.userModel.employeeCode),
                        clockDate: today
                    })
                });

                if (!response.ok) throw new Error('Failed to load attendance');

                const data = await response.json();
                console.log('Attendance data:', data);

                if (data.isSuccess && data.data.clockInDetails && data.data.clockInDetails.length > 0) {
                    const logs = data.data.clockInDetails;
                    let html = '<div class="attendance-log">';

                    logs.forEach(log => {
                        const badgeClass = log.inOutType === 'IN' ? 'badge-in' : 'badge-out';
                        html += `
                            <div class="log-entry">
                                <div class="log-type">
                                    <i class="fa-solid fa-${log.inOutType === 'IN' ? 'sign-in-alt' : 'sign-out-alt'}"></i>
                                    <span class="log-badge ${badgeClass}">${log.inOutType}</span>
                                    <span>${log.clockTime}</span>
                                </div>
                                <div style="font-size: 12px; color: var(--text-secondary);">
                                    ${log.deviceName || log.sourceName}
                                </div>
                            </div>
                        `;
                    });

                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No attendance records for today</div>';
                }
            } catch (error) {
                console.error('Failed to load attendance:', error);
                container.innerHTML = '<div class="error">Failed to load attendance</div>';
            }
        }

        async function logoutFromMewurk() {
            if (confirm('Are you sure you want to logout from Mewurk?')) {
                mewurkData = {
                    isLoggedIn: false,
                    token: null,
                    refreshToken: null,
                    userModel: null,
                    tenantId: null
                };

                await api.invoke('save-session', 'mewurk-data', mewurkData);

                document.getElementById('dashboard-view').style.display = 'none';
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('mewurk-email').value = '';
                document.getElementById('mewurk-password').value = '';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>

</html>
